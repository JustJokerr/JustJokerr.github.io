<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/articles.css">
    <title>最新文章</title>
    <!-- 封面开头动效另写外联,这样方便改,而且这样对于博客这种多文章的网页,适配性和拓展性更高,看起来也更简洁 -->
     <style>
        body{
            background-image: url(../images/paperbackground.png);
            background-size: cover;
        }
        body::after{
            content: '';
            z-index: -2;
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            bottom: 0;
            background: inherit;
            filter: saturate(1.3) contrast(1.1)brightness(0.68);
        }
        .contentc p{
            text-align: center;
        }
        /* 这个其实没什么必要,毕竟正文应该左顶行,不过居中测试时视觉效果更好一些 */
     </style>
</head>
<body>
    <!-- 这里用于放文章封面 -->
    <div class="wrapper">
        <div class="card">
            <img src="../images/Just.Joker2.png" alt="">
            <p><b>Author</b></p>
        </div>
        <div class="popup">
            <img src="../images/Lena.png" alt="">
        </div>
        <!-- 这里用于放文章作者个性图片或者其他什么的东西 -->
    </div>
    <div class="main">
        <br>
        <section>
            <div class="titlec">
              <p><span class="title">文章标题&nbsp;</span><span class="author">By Author</span></p>
            </div>
            <br>
            <div class="contentc">
                <p>正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容</p>
                <p>正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容</p>
                <p>正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容</p>
            </div>
        </section>
    </div>
    
</body>
</html>
