<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 所有样式都从articles.css加载，无内联 -->
    <link rel="stylesheet" href="../css/articles.css">
    <!-- favicon路径修正：指向根目录images -->
    <link rel="icon" href="../images/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
    <title>最新文章</title>
</head>
<body>
    <!-- 导航栏占位容器 -->
    <div id="common-nav-container"></div>

    <!-- 文章封面 -->
    <div class="wrapper">
        <div class="card">
            <img src="../images/Just.Joker2.png" alt="">
            <p><b>Author</b></p>
        </div>
        <div class="popup">
            <img src="../images/Lena.png" alt="">
        </div>
    </div>

    <!-- 文章主体内容 -->
    <div class="main">
        <br>
        <section>
            <div class="titlec">
                <p><span class="title">文章标题&nbsp;</span><span class="author">By Author</span></p>
            </div>
            <br>
            <div class="contentc">
                <p>正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容</p>
                <p>正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容</p>
                <p>正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容正文内容</p>
            </div>
        </section>
    </div>

    <!-- 加载导航栏脚本 -->
    <script>
        window.addEventListener('load', function() {
            fetch('../components/nav-header.html')
                .then(response => {
                    if (!response.ok) throw new Error('导航栏HTML加载失败');
                    return response.text();
                })
                .then(html => {
                    document.getElementById('common-nav-container').innerHTML = html;
                    const navStyle = document.createElement('link');
                    navStyle.rel = 'stylesheet';
                    navStyle.href = '../components/nav-common.css';
                    document.head.appendChild(navStyle);
                    const navScript = document.createElement('script');
                    navScript.src = '../components/nav-common.js';
                    navScript.onload = function() {
                        if (typeof initNav === 'function') initNav();
                    };
                    document.body.appendChild(navScript);
                })
                .catch(error => {
                    console.warn('导航栏加载失败：', error);
                    document.getElementById('common-nav-container').innerHTML = `
                        <header style="height:80px;background:rgba(40,40,40,0.8);padding:0 20px;display:flex;align-items:center;justify-content:space-between;">
                            <div style="display:flex;align-items:center;gap:10px;">
                                <img src="../images/avatar.jpg" width="50px" height="50px" style="border-radius:50%;">
                                <h1 style="color:#fff;margin:0;">Joker <span style="background:#e8491d;color:#000;">Blog</span></h1>
                            </div>
                            <ul style="list-style:none;display:flex;gap:20px;margin:0;">
                                <li><a href="../index.html" style="color:#fff;text-decoration:none;">首页</a></li>
                                <li><a href="./showcase.html" style="color:#fff;text-decoration:none;">展示区</a></li>
                                <li><a href="./latest.html" style="color:#e8491d;font-weight:bold;">文章</a></li>
                            </ul>
                        </header>
                    `;
                });
        });
    </script>

    <!-- 加载通用页脚脚本 -->
    <script>
        window.addEventListener('load', function() {
            fetch('../components/footer-common.html')
                .then(response => {
                    if (!response.ok) throw new Error('页脚HTML加载失败');
                    return response.text();
                })
                .then(html => {
                    const footerContainer = document.createElement('div');
                    footerContainer.innerHTML = html;
                    document.body.appendChild(footerContainer);
                    const footerStyle = document.createElement('link');
                    footerStyle.rel = 'stylesheet';
                    footerStyle.href = '../components/footer-common.css';
                    document.head.appendChild(footerStyle);
                    const footerScript = document.createElement('script');
                    footerScript.src = '../components/footer-common.js';
                    footerScript.onload = function() {
                        if (typeof initFooter === 'function') initFooter();
                    };
                    document.body.appendChild(footerScript);
                })
                .catch(error => {
                    console.warn('页脚加载失败：', error);
                    const footer = document.createElement('footer');
                    footer.className = 'common-footer';
                    footer.innerHTML = `
                        <p class="hitokoto-text">人生如逆旅，我亦是行人。 —— 苏轼</p>
                        <p class="copyright-text">© 2026 Just.Joker | 个人博客展示平台</p>
                    `;
                    document.body.appendChild(footer);
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = '../components/footer-common.css';
                    document.head.appendChild(link);
                });
        });
    </script>

</body>
</html>
